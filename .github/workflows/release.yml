name: Publish Custom Repository Release

on:
  push:
    tags:
      - "v*.*.*.*"

permissions:
  contents: write

concurrency:
  group: market-route-cn-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamudHome = Join-Path $env:RUNNER_TEMP "dalamud"
          $archive = Join-Path $env:RUNNER_TEMP "dalamud.zip"

          New-Item -ItemType Directory -Path $dalamudHome -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $dalamudHome -Force

          $dalamudDll = Join-Path $dalamudHome "Dalamud.dll"
          if (-not (Test-Path $dalamudDll)) {
            throw "Dalamud.dll was not found after extracting the official Dalamud distribution."
          }

          "DALAMUD_HOME=$dalamudHome" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+\.\d+)$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH.REVISION, for example v0.9.0.0."
          }

          $version = $Matches[1]
          [xml]$project = Get-Content .\MarketRouteCN\MarketRouteCN.csproj
          $declaredVersion = [string]$project.Project.PropertyGroup.Version

          if ($declaredVersion -ne $version) {
            throw "The tag version ($version) must match <Version> in MarketRouteCN.csproj ($declaredVersion)."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore .\MarketRouteCN.sln

      - name: Build and package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          dotnet build .\MarketRouteCN.sln `
            -c Release `
            -p:Platform=x64 `
            -p:Version=$version `
            -p:AssemblyVersion=$version `
            -p:FileVersion=$version `
            --no-restore

      - name: Stage and validate release asset
        id: package
        shell: pwsh
        run: |
          $zip = Get-ChildItem `
            .\MarketRouteCN\bin\x64\Release `
            -Filter latest.zip `
            -Recurse |
            Select-Object -First 1

          if ($null -eq $zip) {
            throw "DalamudPackager did not generate latest.zip."
          }

          New-Item -ItemType Directory -Force .\release | Out-Null
          $asset = (Resolve-Path .\release).Path + "\MarketRouteCN.zip"
          Copy-Item $zip.FullName $asset -Force

          .\scripts\Test-ReleasePackage.ps1 -ZipPath $asset
          "asset=$asset" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $asset = "${{ steps.package.outputs.asset }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          }
          else {
            gh release create $tag $asset `
              --title "MarketRoute CN ${{ steps.version.outputs.version }}" `
              --generate-notes
          }

      - name: Generate repo.json
        shell: pwsh
        run: |
          .\scripts\New-RepoJson.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -Tag "${{ steps.version.outputs.tag }}" `
            -OutputPath "$env:RUNNER_TEMP\repo.json" `
            -Changelog "MarketRoute CN ${{ steps.version.outputs.version }}"

          Get-Content "$env:RUNNER_TEMP\repo.json" | ConvertFrom-Json | Out-Null

      - name: Update repo.json on main
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          Copy-Item "$env:RUNNER_TEMP\repo.json" .\repo.json -Force
          git add repo.json
          git diff --cached --quiet

          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update repo.json for ${{ steps.version.outputs.tag }}"
            git push origin main
          }
          else {
            Write-Host "repo.json already matches this release."
          }
